<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FRIST — Übersicht</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1015; --bg2:#131820; --bg3:#1a212b; --line:#232b36;
    --txt:#e8ecf2; --muted:#8b96a5; --muted2:#5c6675;
    --locked:#6b8cff; --soon:#f0a83c; --free:#34d6a3; --neg:#ef5f6b;
    --sans:'Inter',system-ui,sans-serif; --disp:'Space Grotesk',var(--sans); --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1200px 600px at 80% -10%, #16202e 0%, transparent 60%),var(--bg);
    color:var(--txt);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;padding:24px 16px 80px}
  .wrap{max-width:960px;margin:0 auto}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
  .brand{display:flex;align-items:baseline;gap:12px}
  .logo{font-family:var(--disp);font-weight:700;font-size:28px;letter-spacing:2px}
  .logo .k{color:var(--free)}
  .nav{display:flex;gap:6px;background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:4px}
  .nav a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 13px;border-radius:7px;transition:.15s}
  .nav a:hover{color:var(--txt)}
  .nav a.active{background:var(--bg);color:var(--txt)}
  .right{display:flex;gap:8px;align-items:center}
  .btn{background:var(--bg3);border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:12px;padding:8px 12px;border-radius:9px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px}
  .btn:hover{color:var(--txt);border-color:#31404f}
  .btn svg{transition:transform .5s}.btn.spin svg{transform:rotate(360deg)}

  /* KPI cards */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:linear-gradient(180deg,var(--bg2),#10151c);border:1px solid var(--line);border-radius:14px;padding:15px 16px}
  .kpi .lab{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted2)}
  .kpi .val{font-family:var(--disp);font-size:21px;font-weight:600;margin-top:4px}
  .kpi .sub{font-size:12px;margin-top:2px}
  .pos{color:var(--free)}.negc{color:var(--neg)}

  .card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .card-title{font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:.3px}
  .ranges{display:flex;gap:5px}
  .ranges button{background:var(--bg3);border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer}
  .ranges button.on{background:var(--free);color:#04150f;border-color:var(--free);font-weight:600}

  /* hero chart */
  .hero-wrap{position:relative;width:100%}
  .hero-wrap svg{width:100%;height:auto;display:block}
  .guide{position:absolute;top:0;width:1px;background:var(--muted2);pointer-events:none;opacity:0;transition:opacity .1s}
  .tip{position:absolute;top:0;transform:translate(-50%,-110%);background:var(--bg3);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:11px;pointer-events:none;opacity:0;white-space:nowrap;z-index:5}
  .tip .d{color:var(--muted);font-family:var(--mono);margin-bottom:3px}
  .tip .v{font-family:var(--mono);font-weight:600}
  .tip .i{color:var(--muted);font-family:var(--mono);font-size:10px;margin-top:1px}
  .legend{display:flex;gap:18px;margin-top:12px;font-size:12px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:6px}
  .swatch{width:14px;height:3px;border-radius:2px}
  .chart-empty,.note{color:var(--muted);font-size:13px;text-align:center;padding:30px 10px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:720px){.grid2{grid-template-columns:1fr}}

  /* donut */
  .donut-row{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .donut-legend{display:flex;flex-direction:column;gap:8px;font-size:12.5px;flex:1;min-width:130px}
  .donut-legend .row{display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
  .donut-legend .tk{font-weight:600}
  .donut-legend .pc{margin-left:auto;font-family:var(--mono);color:var(--muted)}

  /* per-token bars */
  .pl-row{display:grid;grid-template-columns:56px 1fr 84px;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a2028}
  .pl-row:last-child{border-bottom:none}
  .pl-tk{font-family:var(--mono);font-weight:600;font-size:13px}
  .pl-track{position:relative;height:8px;background:#0a0d12;border-radius:99px;overflow:hidden}
  .pl-fill{position:absolute;top:0;bottom:0;border-radius:99px}
  .pl-val{text-align:right;font-family:var(--mono);font-size:12.5px}

  .meter{height:9px;background:#0a0d12;border:1px solid var(--line);border-radius:99px;overflow:hidden;margin-top:6px}
  .meter-fill{height:100%;background:linear-gradient(90deg,var(--locked),var(--free));border-radius:99px;transition:width .9s}
  .meter-top{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
  .meter-top b{font-family:var(--disp);color:var(--txt)}

  /* login */
  .login-gate{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:20px;background:radial-gradient(900px 500px at 70% -10%,#16202e,transparent 60%),var(--bg)}
  .login-card{background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:34px 30px;width:100%;max-width:340px;text-align:center}
  .login-logo{font-family:var(--disp);font-weight:700;font-size:34px;letter-spacing:3px}.login-logo::after{content:"·";color:var(--free)}
  .login-sub{color:var(--muted);font-size:13px;margin:4px 0 22px}
  .login-card input{background:#0b0e13;border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:10px;font-size:13.5px;width:100%;margin-bottom:12px;outline:none}
  .login-card input:focus{border-color:var(--locked)}
  .login-btn{width:100%;background:var(--free);color:#04150f;border:none;border-radius:10px;padding:12px;font-family:var(--disp);font-weight:600;font-size:14px;cursor:pointer}
  .login-err{color:var(--neg);font-size:12px;margin-top:12px;min-height:16px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="loginGate" class="login-gate">
  <div class="login-card">
    <div class="login-logo">FRIST</div>
    <p class="login-sub">Anmeldung erforderlich</p>
    <input id="loginEmail" type="email" placeholder="E-Mail" autocomplete="username"/>
    <input id="loginPass" type="password" placeholder="Passwort" autocomplete="current-password"/>
    <button id="loginBtn" class="login-btn">Anmelden</button>
    <div id="loginErr" class="login-err"></div>
  </div>
</div>

<div class="wrap" id="appWrap" style="display:none">
  <header>
    <div class="brand">
      <div class="logo">FRIST</div>
      <nav class="nav">
        <a href="index.html">Tracker</a>
        <a href="overview.html" class="active">Übersicht</a>
      </nav>
    </div>
    <div class="right">
      <button class="btn" id="refreshBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg><span id="refreshTxt">Aktualisieren</span></button>
      <button class="btn" id="logoutBtn">Abmelden</button>
    </div>
  </header>

  <div class="kpis">
    <div class="kpi"><div class="lab">Investiert</div><div class="val mono" id="kInvested">—</div></div>
    <div class="kpi"><div class="lab">Aktueller Wert</div><div class="val mono" id="kValue">—</div></div>
    <div class="kpi"><div class="lab">G/V unrealisiert</div><div class="val mono" id="kPL">—</div><div class="sub mono" id="kPLpct"></div></div>
    <div class="kpi"><div class="lab">Steuerfrei jetzt</div><div class="val mono pos" id="kFree">—</div><div class="sub" id="kFreeSub" style="color:var(--muted2)"></div></div>
  </div>

  <div class="card">
    <div class="card-head">
      <div class="card-title">Portfolio-Verlauf</div>
      <div class="ranges" id="ranges">
        <button data-r="30">30T</button>
        <button data-r="90">90T</button>
        <button data-r="max" class="on">Max</button>
      </div>
    </div>
    <div class="hero-wrap" id="heroWrap"><div class="chart-empty">Lade Verlauf…</div></div>
    <div class="legend">
      <span><i class="swatch" style="background:var(--free)"></i>Wert</span>
      <span><i class="swatch" style="background:var(--muted2)"></i>Investiert</span>
    </div>
  </div>

  <div class="card">
    <div class="meter-top"><span>Fortschritt Richtung <b id="targetLbl">1.000.000 €</b></span><b id="pctLbl" class="mono">0 %</b></div>
    <div class="meter"><div class="meter-fill" id="meterFill" style="width:0%"></div></div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title" style="margin-bottom:14px">Allokation</div>
      <div class="donut-row">
        <svg id="donut" width="140" height="140" viewBox="0 0 140 140"></svg>
        <div class="donut-legend" id="donutLegend"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title" style="margin-bottom:8px">Performance je Token</div>
      <div id="plList"></div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

/* ====== FILL THESE IN (gleich wie in der Tracker-App) ====== */
const SB_URL  = "https://ejqtxwfskwdnpdfbqupt.supabase.co";
const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqcXR4d2Zza3dkbnBkZmJxdXB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjE0MDgsImV4cCI6MjA5OTU5NzQwOH0.vxmDVqUdUeujDVCMuNX8xSHAE7IuImTnXG6Ez7yYffo";
const CG_KEY  = ""; // optional CoinGecko Demo-Key; leer lassen ist ok
/* =========================================================== */
const sb = createClient(SB_URL, SB_ANON);

const CG_IDS = { BTC:"bitcoin", ETH:"ethereum", SOL:"solana", AVAX:"avalanche-2", ONDO:"ondo-finance", TAO:"bittensor" };
const TOKEN_COLORS = ["#6b8cff","#34d6a3","#f0a83c","#c77dff","#ff8f6b","#4fd8e0","#e0d24f","#ff6b9d"];
const HOLD_DAYS=365, DAY=86400000;

let state = { batches:[], prices:{}, history:{}, series:[], target:1000000, range:"max" };
let colorMap = {};

/* helpers */
const eur = n => (n==null||isNaN(n))?"—":n.toLocaleString("de-DE",{style:"currency",currency:"EUR",maximumFractionDigits:n>=1000?0:2});
const eurS = n => n.toLocaleString("de-DE",{maximumFractionDigits:0})+" €";
const parseD = s => { const d=new Date(s); d.setHours(0,0,0,0); return d; };
const today = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const daysBetween=(a,b)=>Math.floor((b-a)/DAY);
const fmtDay = ds => { const [y,m,d]=ds.split("-"); return `${d}.${m}.${y.slice(2)}`; };
const cost = b => b.amount_eur ?? b.qty*b.entryPrice;
function colorFor(tk){ if(!colorMap[tk]){ colorMap[tk]=TOKEN_COLORS[Object.keys(colorMap).length%TOKEN_COLORS.length]; } return colorMap[tk]; }
const priceOf = tk => state.prices[tk] ?? null;

/* data */
async function fetchBatches(){
  const { data, error } = await sb.from("batches").select("*").order("bought_at",{ascending:true});
  if(error) return;
  state.batches = (data||[]).map(r=>({ id:r.id, ticker:r.ticker, type:r.type,
    date:(r.bought_at||"").slice(0,10), qty:Number(r.qty), entryPrice:Number(r.entry_price),
    amount_eur:r.amount_eur!=null?Number(r.amount_eur):null }));
}
async function fetchLivePrices(){
  const ids=[...new Set(state.batches.filter(b=>CG_IDS[b.ticker]).map(b=>CG_IDS[b.ticker]))];
  if(!ids.length) return;
  try{
    const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(",")}&vs_currencies=eur`, CG_KEY?{headers:{"x-cg-demo-api-key":CG_KEY}}:{});
    const j=await r.json();
    for(const [tk,id] of Object.entries(CG_IDS)) if(j[id]?.eur!=null) state.prices[tk]=j[id].eur;
  }catch(e){}
}
async function fetchHistory(){
  const tickers=[...new Set(state.batches.filter(b=>CG_IDS[b.ticker]).map(b=>b.ticker))];
  if(!tickers.length) return;
  const start=parseD(state.batches[0].date);
  const days=Math.max(1, daysBetween(start,today())+1);
  for(const tk of tickers){
    try{
      const url=`https://api.coingecko.com/api/v3/coins/${CG_IDS[tk]}/market_chart?vs_currency=eur&days=${days}`;
      const r=await fetch(url, CG_KEY?{headers:{"x-cg-demo-api-key":CG_KEY}}:{});
      const j=await r.json();
      const byDate={};
      (j.prices||[]).forEach(([ts,p])=>{ byDate[new Date(ts).toISOString().slice(0,10)]=p; });
      if(state.prices[tk]!=null) byDate[today().toISOString().slice(0,10)]=state.prices[tk];
      state.history[tk]=Object.entries(byDate).map(([date,price])=>({date,price})).sort((a,b)=>a.date<b.date?-1:1);
    }catch(e){}
  }
}
function priceOnDate(tk, ds){
  const h=state.history[tk]; if(!h||!h.length) return priceOf(tk);
  let last=null; for(const pt of h){ if(pt.date<=ds) last=pt.price; else break; }
  return last ?? h[0].price;
}
function buildSeries(){
  if(!state.batches.length){ state.series=[]; return; }
  const start=parseD(state.batches[0].date), end=today(), out=[];
  for(let t=start.getTime(); t<=end.getTime(); t+=DAY){
    const ds=new Date(t).toISOString().slice(0,10);
    let value=0, invested=0; const held={};
    for(const b of state.batches){ if(b.date<=ds){ held[b.ticker]=(held[b.ticker]||0)+b.qty; invested+=cost(b); } }
    for(const tk in held){ const p=priceOnDate(tk,ds); if(p!=null) value+=held[tk]*p; }
    out.push({date:ds, value, invested});
  }
  state.series=out;
}

/* render */
function renderKPIs(){
  let invested=0, value=0, freeVal=0, freeCount=0;
  state.batches.forEach(b=>{ invested+=cost(b); const p=priceOf(b.ticker); const v=p!=null?b.qty*p:cost(b); value+=v;
    if(daysBetween(parseD(b.date),today())>=HOLD_DAYS){ freeVal+=v; freeCount++; } });
  const pl=value-invested, plPct=invested?pl/invested*100:0;
  document.getElementById("kInvested").textContent=eur(invested);
  document.getElementById("kValue").textContent=eur(value);
  const plEl=document.getElementById("kPL"); plEl.textContent=(pl>=0?"+":"")+eur(pl); plEl.className="val mono "+(pl>=0?"pos":"negc");
  const pctEl=document.getElementById("kPLpct"); pctEl.textContent=state.batches.length?((pl>=0?"+":"")+plPct.toFixed(1)+" %"):""; pctEl.className="sub mono "+(pl>=0?"pos":"negc");
  document.getElementById("kFree").textContent=eur(freeVal);
  document.getElementById("kFreeSub").textContent=freeCount?`${freeCount} Batch(es) > 12 Mon.`:"noch keine";
  const pct=Math.min(value/state.target*100,100);
  document.getElementById("meterFill").style.width=pct+"%";
  document.getElementById("pctLbl").textContent=pct.toFixed(1)+" %";
  document.getElementById("targetLbl").textContent=eur(state.target);
}

function renderHero(){
  const wrap=document.getElementById("heroWrap");
  const full=state.series;
  if(!full || full.length<2){ wrap.innerHTML='<div class="chart-empty">Noch nicht genug Daten für einen Verlauf — logge ein paar Käufe.</div>'; return; }
  const series = state.range==="max" ? full : full.slice(-Number(state.range));
  if(series.length<2){ wrap.innerHTML='<div class="chart-empty">Für diesen Zeitraum zu wenig Daten.</div>'; return; }
  const W=720,H=280,padL=6,padR=6,padT=14,padB=22;
  const maxV=Math.max(...series.map(s=>Math.max(s.value,s.invested)),1);
  const x=i=> padL + i*(W-padL-padR)/(series.length-1);
  const y=v=> padT + (1-v/maxV)*(H-padT-padB);
  const valPts=series.map((s,i)=>`${x(i).toFixed(1)},${y(s.value).toFixed(1)}`);
  const area=`M ${x(0)},${y(0)} L ${valPts.join(" L ")} L ${x(series.length-1)},${y(0)} Z`;
  const valLine=`M ${valPts.join(" L ")}`;
  const invLine=`M ${series.map((s,i)=>`${x(i).toFixed(1)},${y(s.invested).toFixed(1)}`).join(" L ")}`;
  // gridlines (4) + labels
  let grid="";
  for(let g=0;g<=3;g++){ const gv=maxV*g/3; const gy=y(gv); grid+=`<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="#1a2028" stroke-width="1"/><text x="${padL+2}" y="${gy-3}" fill="#5c6675" font-size="9" font-family="monospace">${eurS(gv)}</text>`; }
  const firstLbl=fmtDay(series[0].date), lastLbl=fmtDay(series[series.length-1].date);
  wrap.innerHTML=`
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible">
      <defs><linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#34d6a3" stop-opacity="0.35"/><stop offset="100%" stop-color="#34d6a3" stop-opacity="0"/></linearGradient></defs>
      ${grid}
      <path d="${area}" fill="url(#fill)"/>
      <path d="${invLine}" fill="none" stroke="#5c6675" stroke-width="1.5" stroke-dasharray="4 4"/>
      <path d="${valLine}" fill="none" stroke="#34d6a3" stroke-width="2.2"/>
      <text x="${padL}" y="${H-6}" fill="#5c6675" font-size="9" font-family="monospace">${firstLbl}</text>
      <text x="${W-padR}" y="${H-6}" fill="#5c6675" font-size="9" font-family="monospace" text-anchor="end">${lastLbl}</text>
    </svg>
    <div class="guide" id="guide"></div>
    <div class="tip" id="tip"></div>`;
  setupHover(series);
}
function setupHover(series){
  const wrap=document.getElementById("heroWrap"), guide=document.getElementById("guide"), tip=document.getElementById("tip");
  const svg=wrap.querySelector("svg");
  function move(e){
    const rect=svg.getBoundingClientRect();
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    let ratio=Math.max(0,Math.min(1,cx/rect.width));
    const idx=Math.round(ratio*(series.length-1));
    const px=idx/(series.length-1)*rect.width;
    guide.style.left=px+"px"; guide.style.height=rect.height+"px"; guide.style.opacity="1";
    const s=series[idx], pl=s.value-s.invested;
    tip.innerHTML=`<div class="d">${fmtDay(s.date)}</div><div class="v">${eur(s.value)}</div><div class="i">Inv. ${eur(s.invested)} · ${(pl>=0?"+":"")}${eur(pl)}</div>`;
    let tx=px; const tw=tip.offsetWidth; tx=Math.max(tw/2+4,Math.min(rect.width-tw/2-4,tx));
    tip.style.left=tx+"px"; tip.style.top="8px"; tip.style.opacity="1";
  }
  function leave(){ guide.style.opacity="0"; tip.style.opacity="0"; }
  svg.addEventListener("mousemove",move); svg.addEventListener("mouseleave",leave);
  svg.addEventListener("touchmove",move,{passive:true}); svg.addEventListener("touchend",leave);
}

function renderDonut(){
  const svg=document.getElementById("donut"), leg=document.getElementById("donutLegend");
  const vals={}; let total=0;
  state.batches.forEach(b=>{ const p=priceOf(b.ticker); const v=p!=null?b.qty*p:cost(b); vals[b.ticker]=(vals[b.ticker]||0)+v; total+=v; });
  const entries=Object.entries(vals).sort((a,b)=>b[1]-a[1]);
  if(!total){ svg.innerHTML=""; leg.innerHTML='<div style="color:var(--muted2);font-size:12px">Noch keine Positionen.</div>'; return; }
  const cx=70,cy=70,r=52,C=2*Math.PI*r; let off=0;
  let segs=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#0a0d12" stroke-width="16"/>`;
  entries.forEach(([tk,v])=>{ const frac=v/total, len=frac*C, c=colorFor(tk);
    segs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len; });
  segs+=`<text x="${cx}" y="${cy-2}" text-anchor="middle" fill="#e8ecf2" font-size="15" font-family="'Space Grotesk'" font-weight="600">${eurS(total)}</text>`;
  segs+=`<text x="${cx}" y="${cy+14}" text-anchor="middle" fill="#5c6675" font-size="9" font-family="monospace">gesamt</text>`;
  svg.innerHTML=segs;
  leg.innerHTML=entries.map(([tk,v])=>`<div class="row"><i class="dot" style="background:${colorFor(tk)}"></i><span class="tk">${tk}</span><span class="pc">${(v/total*100).toFixed(0)}%</span></div>`).join("");
}

function renderPL(){
  const el=document.getElementById("plList");
  const groups={};
  state.batches.forEach(b=>{ const g=groups[b.ticker]||(groups[b.ticker]={cost:0,val:0}); g.cost+=cost(b); const p=priceOf(b.ticker); g.val+=p!=null?b.qty*p:cost(b); });
  const rows=Object.entries(groups).map(([tk,g])=>({tk,pct:g.cost?(g.val-g.cost)/g.cost*100:0})).sort((a,b)=>b.pct-a.pct);
  if(!rows.length){ el.innerHTML='<div style="color:var(--muted2);font-size:12px;padding:8px 0">Noch keine Positionen.</div>'; return; }
  const maxAbs=Math.max(...rows.map(r=>Math.abs(r.pct)),1);
  el.innerHTML=rows.map(r=>{
    const pos=r.pct>=0, w=Math.min(Math.abs(r.pct)/maxAbs*50,50), color=pos?"var(--free)":"var(--neg)";
    const fill=pos?`left:50%;width:${w}%;background:${color}`:`right:50%;width:${w}%;background:${color}`;
    return `<div class="pl-row"><div class="pl-tk" style="color:${colorFor(r.tk)}">${r.tk}</div>
      <div class="pl-track"><div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:#2b3440"></div><div class="pl-fill" style="${fill}"></div></div>
      <div class="pl-val" style="color:${color}">${pos?"+":""}${r.pct.toFixed(1)}%</div></div>`;
  }).join("");
}

function renderAll(){ renderKPIs(); renderDonut(); renderPL(); renderHero(); }

/* ranges */
document.getElementById("ranges").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  state.range=b.dataset.r;
  [...document.querySelectorAll("#ranges button")].forEach(x=>x.classList.toggle("on",x===b));
  renderHero();
});

/* refresh + logout */
async function refresh(){
  const btn=document.getElementById("refreshBtn"); btn.classList.add("spin"); document.getElementById("refreshTxt").textContent="lädt…";
  await fetchBatches(); await fetchLivePrices(); renderKPIs(); renderDonut(); renderPL();
  await fetchHistory(); buildSeries(); renderHero();
  btn.classList.remove("spin"); document.getElementById("refreshTxt").textContent="Aktualisieren";
}
document.getElementById("refreshBtn").onclick=refresh;
document.getElementById("logoutBtn").onclick=()=>sb.auth.signOut();

/* auth */
async function startApp(){
  document.getElementById("loginGate").style.display="none";
  document.getElementById("appWrap").style.display="block";
  await fetchBatches(); renderKPIs(); renderDonut(); renderPL();
  await fetchLivePrices(); renderKPIs(); renderDonut(); renderPL();
  await fetchHistory(); buildSeries(); renderHero();
}
function showLogin(){ document.getElementById("appWrap").style.display="none"; document.getElementById("loginGate").style.display="grid"; }
document.getElementById("loginBtn").onclick=async()=>{
  const email=document.getElementById("loginEmail").value.trim(), password=document.getElementById("loginPass").value;
  const err=document.getElementById("loginErr"); err.textContent="";
  const { error }=await sb.auth.signInWithPassword({ email, password });
  if(error) err.textContent="Anmeldung fehlgeschlagen: "+error.message;
};
document.getElementById("loginPass").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("loginBtn").click(); });
sb.auth.onAuthStateChange((_e,session)=>{ if(session) setTimeout(startApp,0); else showLogin(); });
</script>
